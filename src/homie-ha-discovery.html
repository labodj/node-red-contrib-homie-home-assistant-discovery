<script type="text/javascript">
  (function () {
    function validateRequiredTrimmed(value) {
      return String(value || "").trim().length > 0;
    }

    function validateTopicPrefix(value) {
      const normalized = String(value || "").trim();
      if (!normalized || normalized.includes("+") || normalized.includes("#")) return false;
      if (normalized.startsWith("/") || normalized.endsWith("/")) return false;
      return !normalized.split("/").some((segment) => segment.length === 0);
    }

    function validateOverridesJson(value) {
      const normalized = String(value || "").trim();
      if (!normalized) return true;
      try {
        JSON.parse(normalized);
        return true;
      } catch {
        return false;
      }
    }

    function updateVersionWarning() {
      const hasVersion =
        $("#node-input-enableV3").is(":checked") ||
        $("#node-input-enableV4").is(":checked") ||
        $("#node-input-enableV5").is(":checked");
      $("#node-input-version-warning").toggle(!hasVersion);
    }

    const OVERRIDES_EDITOR_HEIGHT = 260;

    function destroyOverridesEditor(node) {
      if (node._homieHaOverridesEditor) {
        node._homieHaOverridesEditor.destroy();
        delete node._homieHaOverridesEditor;
      }
    }

    function lockOverridesEditorContainerHeight(container) {
      if (!container) {
        return;
      }

      container.style.height = `${OVERRIDES_EDITOR_HEIGHT}px`;
      container.style.maxHeight = `${OVERRIDES_EDITOR_HEIGHT}px`;
      container.style.overflow = "hidden";
    }

    function resizeOverridesEditor(node) {
      const editor = node._homieHaOverridesEditor;
      const container = document.getElementById("node-input-overridesJson-editor");
      if (!editor || !container) {
        return;
      }

      lockOverridesEditorContainerHeight(container);
      const width = Math.floor(container.clientWidth);
      const height = Math.floor(container.clientHeight || OVERRIDES_EDITOR_HEIGHT);
      if (width > 0 && height > 0 && typeof editor.layout === "function") {
        editor.layout({ width, height });
        return;
      }
      if (typeof editor.resize === "function") {
        editor.resize(true);
      }
    }

    function scheduleOverridesEditorResize(node) {
      const resize = () => resizeOverridesEditor(node);
      if (typeof requestAnimationFrame === "function") {
        requestAnimationFrame(resize);
      }
      setTimeout(resize, 0);
      setTimeout(resize, 50);
    }

    RED.nodes.registerType("homie-ha-discovery", {
      category: "home automation",
      color: "#d8bfd8",
      defaults: {
        name: { value: "" },
        discoveryPrefix: {
          value: "homeassistant",
          required: true,
          validate: validateTopicPrefix,
        },
        idPrefix: { value: "homie", required: true, validate: validateRequiredTrimmed },
        homieDomain: { value: "homie", required: true, validate: validateTopicPrefix },
        legacyRoot: { value: "homie", required: true, validate: validateTopicPrefix },
        enableV3: { value: true },
        enableV4: { value: true },
        enableV5: { value: true },
        emitSubscriptions: { value: true },
        includeStateSensor: { value: true },
        includeAttributeDiagnostics: { value: true },
        defaultCommandableBooleanPlatform: { value: "auto" },
        manufacturer: { value: "Homie", required: true, validate: validateRequiredTrimmed },
        model: { value: "Homie MQTT Device", required: true, validate: validateRequiredTrimmed },
        overridesJson: { value: "", validate: validateOverridesJson },
      },
      inputs: 1,
      outputs: 4,
      outputLabels: ["discovery", "diagnostics", "debug", "subscriptions"],
      icon: "font-awesome/fa-sitemap",
      label: function () {
        return this.name || "homie-ha-discovery";
      },
      oneditprepare: function () {
        const node = this;

        const getOverridesText = () =>
          node._homieHaOverridesEditor
            ? node._homieHaOverridesEditor.getValue()
            : String($("#node-input-overridesJson").val() || "");

        const renderOverridesValidation = () => {
          const text = getOverridesText().trim();
          const $message = $("#node-input-overridesValidation");
          if (!text) {
            $message
              .removeClass("homie-ha-validation-error")
              .addClass("homie-ha-validation-ok")
              .text("Overrides JSON is optional.");
            return;
          }

          try {
            JSON.parse(text);
            $message
              .removeClass("homie-ha-validation-error")
              .addClass("homie-ha-validation-ok")
              .text("Valid JSON.");
          } catch (error) {
            $message
              .removeClass("homie-ha-validation-ok")
              .addClass("homie-ha-validation-error")
              .text(error instanceof Error ? error.message : String(error));
          }
        };

        const setOverridesText = (value) => {
          const text = String(value || "");
          if (node._homieHaOverridesEditor) {
            node._homieHaOverridesEditor.setValue(text, -1);
          }
          $("#node-input-overridesJson").val(text).trigger("change");
          renderOverridesValidation();
        };

        const configureOverridesEditor = (editor) => {
          if (editor.setOptions) {
            editor.setOptions({
              enableBasicAutocompletion: true,
              enableLiveAutocompletion: true,
            });
          }

          if (editor.getSession) {
            editor.getSession().on("change", () => {
              $("#node-input-overridesJson").val(editor.getValue()).trigger("change");
              renderOverridesValidation();
            });
          }
        };

        $("#node-input-enableV3,#node-input-enableV4,#node-input-enableV5").on(
          "change",
          updateVersionWarning,
        );
        $("details.homie-ha-config-section").on("toggle", () => {
          scheduleOverridesEditorResize(node);
        });
        $("#node-input-formatOverrides").on("click", () => {
          const text = getOverridesText().trim();
          if (!text) {
            renderOverridesValidation();
            return;
          }

          try {
            setOverridesText(JSON.stringify(JSON.parse(text), null, 2));
          } catch {
            renderOverridesValidation();
          }
        });

        $("#node-input-overridesJson").hide();
        if (RED.editor?.createEditor) {
          lockOverridesEditorContainerHeight(
            document.getElementById("node-input-overridesJson-editor"),
          );
          node._homieHaOverridesEditor = RED.editor.createEditor({
            id: "node-input-overridesJson-editor",
            mode: "ace/mode/json",
            value: String($("#node-input-overridesJson").val() || ""),
          });
          configureOverridesEditor(node._homieHaOverridesEditor);
          scheduleOverridesEditorResize(node);
        } else {
          $("#node-input-overridesJson").show();
          $("#node-input-overridesJson").on("change keyup", renderOverridesValidation);
        }

        updateVersionWarning();
        renderOverridesValidation();
      },
      oneditsave: function () {
        if (this._homieHaOverridesEditor) {
          $("#node-input-overridesJson").val(this._homieHaOverridesEditor.getValue());
        }
        destroyOverridesEditor(this);
      },
      oneditcancel: function () {
        destroyOverridesEditor(this);
      },
      oneditresize: function () {
        scheduleOverridesEditorResize(this);
      },
    });
  })();
</script>

<script type="text/html" data-help-name="homie-ha-discovery">
  <p>Publishes retained Home Assistant MQTT discovery messages from Homie MQTT metadata.</p>
  <p>
    Use it between Node-RED's normal MQTT input and MQTT output nodes. The MQTT broker, username,
    password, TLS certificates and MQTT protocol version stay in the standard Node-RED MQTT broker
    configuration. This node maps Homie metadata to Home Assistant discovery.
  </p>
  <h3>Wiring</h3>
  <ol>
    <li>Wire an MQTT input node to this node input.</li>
    <li>Wire output 1 to an MQTT output node that publishes to the same broker.</li>
    <li>
      Optional: wire output 4 back to the MQTT input node to let this node manage the Homie
      subscriptions dynamically.
    </li>
  </ol>
  <p>
    If you do not use output 4, subscribe the MQTT input node manually. The broad manual
    subscription is usually <code>homie/#</code>, or the same shape under your own Homie root.
  </p>
  <h3>Input</h3>
  <dl class="message-properties">
    <dt>topic <span class="property-type">string</span></dt>
    <dd>Homie metadata topic, for example <code>homie/5/kitchen-board/$description</code>.</dd>
    <dt>payload <span class="property-type">string | buffer | object | number | boolean</span></dt>
    <dd>
      Homie metadata payload. MQTT input nodes configured as <code>auto-detect</code> are supported.
    </dd>
    <dt class="optional">retain <span class="property-type">boolean</span></dt>
    <dd>Used to detect retained metadata cleanup messages.</dd>
  </dl>
  <h3>Outputs</h3>
  <ol>
    <li>
      Home Assistant discovery MQTT messages with <code>topic</code>, <code>payload</code>,
      <code>qos</code> and <code>retain</code>.
    </li>
    <li>Diagnostics with warnings and logs.</li>
    <li>Original input message passthrough.</li>
    <li>MQTT subscription control messages for Node-RED's MQTT input node.</li>
  </ol>
  <h3>Homie Versions</h3>
  <p>
    Homie v5 uses retained <code>$description</code> documents. Homie v3/v4 use retained topic
    metadata collected from the configured legacy root. At least one Homie version must be enabled.
  </p>
  <p>
    When <b>attribute diagnostics</b> are enabled, observed Homie v5 attribute topics such as
    <code>$fw/version</code>, <code>$stats/uptime</code> or extension topics under
    <code>$implementation/...</code> are exposed as diagnostic entities. The mapper infers only
    conservative metadata from the topic path and payload; use overrides for exact units, icons,
    device classes or state classes. Operational attributes such as <code>$state</code>,
    <code>$description</code>, <code>$log</code> and <code>$alert</code> are not emitted as
    entities.
  </p>
  <h3>Entity Mapping</h3>
  <p>
    The automatic mapper starts from Homie metadata and chooses the most conservative supported Home
    Assistant platform. A generic commandable boolean is a <code>switch</code> unless names, types,
    rules or exact overrides say it is a <code>light</code> or <code>fan</code>.
  </p>
  <table class="node-help">
    <thead>
      <tr>
        <th>Homie property</th>
        <th>Home Assistant entity</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>non-settable <code>boolean</code></td>
        <td><code>binary_sensor</code></td>
      </tr>
      <tr>
        <td>settable <code>boolean</code></td>
        <td>
          semantic auto mapping, configured fallback or override rule: <code>switch</code>,
          <code>light</code> or <code>fan</code>
        </td>
      </tr>
      <tr>
        <td>settable <code>integer</code> or <code>float</code></td>
        <td><code>number</code></td>
      </tr>
      <tr>
        <td>settable <code>enum</code> with options</td>
        <td><code>select</code></td>
      </tr>
      <tr>
        <td>settable <code>enum</code> without options</td>
        <td><code>text</code></td>
      </tr>
      <tr>
        <td>
          settable <code>string</code>, <code>color</code>, <code>datetime</code>,
          <code>duration</code>, <code>json</code>
        </td>
        <td><code>text</code></td>
      </tr>
      <tr>
        <td>
          non-settable <code>integer</code>, <code>float</code>, <code>string</code>,
          <code>enum</code>, <code>color</code>
        </td>
        <td><code>sensor</code></td>
      </tr>
      <tr>
        <td>non-settable <code>datetime</code> or <code>duration</code></td>
        <td><code>sensor</code> with timestamp/duration metadata</td>
      </tr>
      <tr>
        <td>non-settable <code>json</code></td>
        <td><code>sensor</code> with JSON attributes</td>
      </tr>
    </tbody>
  </table>
  <p>
    Homie v3/v4 define <code>integer</code>, <code>float</code>, <code>boolean</code>,
    <code>string</code>, <code>enum</code> and <code>color</code>. Homie v5 also defines
    <code>datetime</code>, <code>duration</code> and <code>json</code>. Homie v3 properties without
    <code>$datatype</code> are treated as <code>string</code>; v4/v5 properties need a datatype
    before discovery can be generated.
  </p>
  <p>
    Homie does not encode enough semantics to safely infer every specialized Home Assistant domain:
    a boolean can be a relay, a light, a fan, a lock bit or an alarm flag. Automatic mapping handles
    cases the mapper can identify conservatively; overrides handle the meaning that only the
    installation or firmware convention knows.
  </p>
  <h3>Boolean Mapping</h3>
  <p>
    <b>Boolean mapping</b> is not an on/off toggle. <code>Auto</code> maps common Homie
    <code>light</code> and <code>fan</code> names/types to matching Home Assistant platforms and
    uses <code>switch</code> when the metadata is generic. Select <code>switch</code>,
    <code>light</code> or <code>fan</code> to force that fallback globally.
  </p>
  <h3>Overrides</h3>
  <p>
    The overrides field accepts strict JSON. Start small: use <code>namedNodeState</code> when the
    useful entity is a commandable boolean <code>node/state</code> property, then add
    <code>nodeNames</code> for readable names and one-off exceptions. Use <code>rules</code> for
    fleet-wide patterns and exact property overrides for entities that need exact configuration.
    Additional Home Assistant MQTT discovery fields can be added with an <code>ha</code> object;
    mapper-managed identity and routing keys are rejected there. Invalid JSON or unsupported fields
    stop node initialization with a configuration error before retained discovery can be published.
  </p>
  <pre><code>{
  "deviceDefaults": {
    "objectId": "home_{deviceId}",
    "identifiers": ["homie:{baseTopic}"]
  },
  "namedNodeState": {
    "platform": "light",
    "objectId": "home_{deviceId}_{nodeId}"
  },
  "devices": {
    "homie/5/kitchen-board": {
      "name": "Kitchen board",
      "nodeNames": {
        "ceiling": "Ceiling light",
        "extractor": {
          "name": "Extractor fan",
          "platform": "fan"
        }
      }
    }
  }
}</code></pre>
  <p>
    JSON comments are not accepted by the editor, but the documentation includes commented
    <code>jsonc</code> examples that explain each line before you paste the clean JSON here.
  </p>
  <h3>Coverage</h3>
  <p>
    The node supports valid Homie v3.0.1, v4.0.0 and v5.x metadata and maps each supported Homie
    datatype to a Home Assistant MQTT entity. It intentionally does not guess complex Home Assistant
    domains such as climate, cover, lock, vacuum, alarm panel or water heater from generic Homie
    metadata alone.
  </p>
</script>
