name: CI & Release

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: node-red-contrib-homie-home-assistant-discovery

jobs:
  quality:
    name: Quality (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: node-red-contrib-homie-home-assistant-discovery

      - name: Checkout core sibling repository
        uses: actions/checkout@v6
        with:
          repository: labodj/homie-home-assistant-discovery
          path: homie-home-assistant-discovery

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            homie-home-assistant-discovery/package-lock.json
            node-red-contrib-homie-home-assistant-discovery/package-lock.json

      - name: Build core sibling repository
        working-directory: homie-home-assistant-discovery
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Check version sync
        run: npm run sync:version:check

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Lint Markdown
        run: npm run lint:md

      - name: Check formatting
        run: npm run format:check

      - name: Check unused code and dependencies
        run: npm run knip

      - name: Build project
        run: npm run build

      - name: Validate package documentation links
        run: npm run validate:package-doc-links

      - name: Verify local package install
        run: npm run verify:package

      - name: Verify package contents
        run: npm run verify:package-contents

      - name: Run tests with coverage thresholds
        run: npm run test:cov

      - name: Audit production dependencies
        run: npm run audit:prod

  compatibility:
    name: Compatibility (Node ${{ matrix.node-version }})
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: node-red-contrib-homie-home-assistant-discovery

      - name: Checkout core sibling repository
        uses: actions/checkout@v6
        with:
          repository: labodj/homie-home-assistant-discovery
          path: homie-home-assistant-discovery

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: |
            homie-home-assistant-discovery/package-lock.json
            node-red-contrib-homie-home-assistant-discovery/package-lock.json

      - name: Build core sibling repository
        working-directory: homie-home-assistant-discovery
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test

  publish:
    name: Publish to npm & GitHub
    needs: [quality, compatibility]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: node-red-contrib-homie-home-assistant-discovery

      - name: Checkout core sibling repository
        uses: actions/checkout@v6
        with:
          repository: labodj/homie-home-assistant-discovery
          path: homie-home-assistant-discovery

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: |
            homie-home-assistant-discovery/package-lock.json
            node-red-contrib-homie-home-assistant-discovery/package-lock.json

      - name: Build core sibling repository
        working-directory: homie-home-assistant-discovery
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Run release quality gate
        run: npm run check

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json version ($PKG_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi

      - name: Verify core dependency is available on npm
        run: |
          CORE_VERSION=$(node -p "require('./package.json').dependencies['homie-home-assistant-discovery']")
          if ! npm view "homie-home-assistant-discovery@${CORE_VERSION}" version >/dev/null 2>&1; then
            echo "Error: homie-home-assistant-discovery@${CORE_VERSION} is not available on npm yet."
            echo "Publish the core package before publishing this Node-RED wrapper."
            exit 1
          fi

      - name: Check whether version is already published on npm
        id: npm_release
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Package ${PKG_NAME}@${PKG_VERSION} already exists on npm. The publish step will be skipped."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack release artifact
        run: npm pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: node-red-contrib-homie-home-assistant-discovery ${{ github.ref_name }}
          generate_release_notes: true
          files: node-red-contrib-homie-home-assistant-discovery/*.tgz

      - name: Publish to npm
        if: steps.npm_release.outputs.already_published != 'true'
        run: npm publish --provenance --tag latest

      - name: Skip npm publish for existing versions
        if: steps.npm_release.outputs.already_published == 'true'
        run: echo "Skipping npm publish because this version is already available on npm."
